document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

the gold accents. Black is never a background. */\n  --combo-light-bg:    var(--at-paper);  /* lightest */\n  --combo-medium-bg:   var(--at-dune);   /* mid */\n  --combo-dark-bg:     var(--at-coyote); /* dark, accent-heavy */\n\n  /* Text/accent roles */\n  --combo-text:        var(--at-black);  /* body on light/medium */\n  --combo-text-dark:   var(--at-paper);  /* body on the dark (Coyote) combo */\n  --combo-heading:     var(--at-coyote); /* display headings / emphasis on light */\n  --combo-heading-alt: var(--at-lion);   /* second colour in a split heading */\n  --combo-accent-box:  var(--at-coyote); /* solid text boxes (names, headings) */\n}\n<\u002Fstyle>\n<style>/* Agent Team — Gradient tokens (all linear, top-to-bottom) */\n:root {\n  --at-grad-coyote-lion:   linear-gradient(180deg, var(--at-coyote) 0%, var(--at-lion) 100%);\n  --at-grad-lion-dune:     linear-gradient(180deg, var(--at-lion) 0%, var(--at-dune) 100%);\n  --at-grad-lion50-dune:   linear-gradient(180deg, var(--at-lion-50) 0%, var(--at-dune) 100%);\n  --at-grad-lion50-dune50: linear-gradient(180deg, var(--at-lion-50) 0%, var(--at-dune-50) 100%);\n\n  /* Semantic */\n  --surface-grad-dark:  var(--at-grad-coyote-lion); /* rich brand gradient */\n  --surface-grad-light: var(--at-grad-lion50-dune); /* light layout background */\n}\n<\u002Fstyle>\n<style>/* Agent Team — Typography tokens\n * Tracking values from the brand guide are in thousandths of an em\n * (Adobe convention): tracking 30 = 0.03em, tracking 80 = 0.08em.\n */\n:root {\n  --font-display: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif; /* condensed all-caps display face */\n  --font-body:    'Inter', Arial, Helvetica, sans-serif;\n\n  /* Display / headings — ALL CAPS, tight leading */\n  --display-family:  var(--font-display);\n  --display-weight:  400; /* Bebas Neue — used at regular weight, never bold */\n  --display-leading: 0.9;\n  --display-tracking: 0.03em;\n  --display-transform: uppercase; /* @kind other */\n\n  /* Subheadings (caps) — Inter Bold, ALL CAPS, open tracking */\n  --subhead-family:  var(--font-body);\n  --subhead-weight:  700;\n  --subhead-leading: 1.5;\n  --subhead-tracking: 0.08em;\n  --subhead-transform: uppercase; /* @kind other */\n\n  /* Subheadings (sentence) — Inter Bold, sentence case for longer lines */\n  --subhead-sentence-tracking: 0.03em;\n\n  /* Body — Inter, sentence case */\n  --body-family:  var(--font-body);\n  --body-leading: 1.5;\n  --body-tracking: 0.03em;\n  --body-weight-regular: 400;\n  --body-weight-medium:  500;\n  --body-weight-bold:    700;\n\n  /* Type scale (video/1080p oriented, but responsive via rem elsewhere) */\n  --size-display-xl: 120px;\n  --size-display-lg: 88px;\n  --size-display-md: 56px;\n  --size-subhead:    18px;\n  --size-body-lg:    22px;\n  --size-body:       18px;\n  --size-body-sm:    15px;\n}\n\n/* Reusable helper classes (optional; tokens are the source of truth) */\n.at-display {\n  font-family: var(--display-family);\n  font-weight: var(--display-weight);\n  line-height: var(--display-leading);\n  letter-spacing: var(--display-tracking);\n  text-transform: var(--display-transform);\n}\n.at-subhead {\n  font-family: var(--subhead-family);\n  font-weight: var(--subhead-weight);\n  line-height: var(--subhead-leading);\n  letter-spacing: var(--subhead-tracking);\n  text-transform: var(--subhead-transform);\n}\n.at-subhead-sentence {\n  font-family: var(--subhead-family);\n  font-weight: var(--subhead-weight);\n  line-height: var(--subhead-leading);\n  letter-spacing: var(--subhead-sentence-tracking);\n}\n.at-body {\n  font-family: var(--body-family);\n  font-weight: var(--body-weight-regular);\n  line-height: var(--body-leading);\n  letter-spacing: var(--body-tracking);\n}\n<\u002Fstyle>\n<style>/* Agent Team — Spacing & radii\n * Calm, generous spacing. The brand is minimal with square-ish geometry;\n * text boxes and pills are the only rounded elements.\n */\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  /* Radii — the brand is largely square; only pills/badges round fully */\n  --radius-none: 0px;\n  --radius-sm: 2px;\n  --radius-pill: 999px;\n\n  /* Logo clear space = half the cap-height of the \"A\" (approx). */\n  --logo-clearspace-ratio: 0.5; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* Agent Team Design System — global entry point.\n * Consumers link ONLY this file. It is a list of @imports.\n */\n/* Agent Team — Webfonts\n * Display: Bebas Neue (Google Fonts) — condensed all-caps face, used at\n *          REGULAR weight (never bold).\n * Body/Subhead: Inter (Google Fonts) — exact match to brand spec.\n * Backup typeface everywhere: Arial.\n */\n/* latin-ext */\n@font-face {\n  font-family: 'Bebas Neue';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"4b2acb7e-5776-4de0-926c-c71f15c0dda8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Bebas Neue';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"bef52452-9f9c-40c0-b0f9-f78954a8a039\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"c8fe79bd-702c-4122-a41e-60861091cf66\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: italic;\n  font-weight: 400;\n  font-display: oft:  var(--at-lion);\n\n  --border-soft:       var(--at-lion-50);\n  --border-accent:     var(--at-lion);\n\n  /* Theme combinations — three background majors.\n   * Light = Paper, Medium = Dune, Dark = Coyote (accent-heavy dark surface).\n   * Lion / 50% Lion are the gold accents. Black is never a background. */\n  --combo-light-bg:    var(--at-paper);  /* lightest */\n  --combo-medium-bg:   var(--at-dune);   /* mid */\n  --combo-dark-bg:     var(--at-coyote); /* dark, accent-heavy */\n\n  /* Text/accent roles */\n  --combo-text:        var(--at-black);  /* body on light/medium */\n  --combo-text-dark:   var(--at-paper);  /* body on the dark (Coyote) combo */\n  --combo-heading:     var(--at-coyote); /* display headings / emphasis on light */\n  --combo-heading-alt: var(--at-lion);   /* second colour in a split heading */\n  --combo-accent-box:  var(--at-coyote); /* solid text boxes (names, headings) */\n}\n\n/* Agent Team — Gradient tokens (all linear, top-to-bottom) */\n:root {\n  --at-grad-coyote-lion:   linear-gradient(180deg, var(--at-coyote) 0%, var(--at-lion) 100%);\n  --at-grad-lion-dune:     linear-gradient(180deg, var(--at-lion) 0%, var(--at-dune) 100%);\n  --at-grad-lion50-dune:   linear-gradient(180deg, var(--at-lion-50) 0%, var(--at-dune) 100%);\n  --at-grad-lion50-dune50: linear-gradient(180deg, var(--at-lion-50) 0%, var(--at-dune-50) 100%);\n\n  /* Semantic */\n  --surface-grad-dark:  var(--at-grad-coyote-lion); /* rich brand gradient */\n  --surface-grad-light: var(--at-grad-lion50-dune); /* light layout background */\n}\n\n/* Agent Team — Typography tokens\n * Tracking values from the brand guide are in thousandths of an em\n * (Adobe convention): tracking 30 = 0.03em, tracking 80 = 0.08em.\n */\n:root {\n  --font-display: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif; /* condensed all-caps display face */\n  --font-body:    'Inter', Arial, Helvetica, sans-serif;\n\n  /* Display / headings — ALL CAPS, tight leading */\n  --display-family:  var(--font-display);\n  --display-weight:  400; /* Bebas Neue — used at regular weight, never bold */\n  --display-leading: 0.9;\n  --display-tracking: 0.03em;\n  --display-transform: uppercase; /* @kind other */\n\n  /* Subheadings (caps) — Inter Bold, ALL CAPS, open tracking */\n  --subhead-family:  var(--font-body);\n  --subhead-weight:  700;\n  --subhead-leading: 1.5;\n  --subhead-tracking: 0.08em;\n  --subhead-transform: uppercase; /* @kind other */\n\n  /* Subheadings (sentence) — Inter Bold, sentence case for longer lines */\n  --subhead-sentence-tracking: 0.03em;\n\n  /* Body — Inter, sentence case */\n  --body-family:  var(--font-body);\n  --body-leading: 1.5;\n  --body-tracking: 0.03em;\n  --body-weight-regular: 400;\n  --body-weight-medium:  500;\n  --body-weight-bold:    700;\n\n  /* Type scale (video/1080p oriented, but responsive via rem elsewhere) */\n  --size-display-xl: 120px;\n  --size-display-lg: 88px;\n  --size-display-md: 56px;\n  --size-subhead:    18px;\n  --size-body-lg:    22px;\n  --size-body:       18px;\n  --size-body-sm:    15px;\n}\n\n/* Reusable helper classes (optional; tokens are the source of truth) */\n.at-display {\n  font-family: var(--display-family);\n  font-weight: var(--display-weight);\n  line-height: var(--display-leading);\n  letter-spacing: var(--display-tracking);\n  text-transform: var(--display-transform);\n}\n.at-subhead {\n  font-family: var(--subhead-family);\n  font-weight: var(--subhead-weight);\n  line-height: var(--subhead-leading);\n  letter-spacing: var(--subhead-tracking);\n  text-transform: var(--subhead-transform);\n}\n.at-subhead-sentence {\n  font-family: var(--subhead-family);\n  font-weight: var(--subhead-weight);\n  line-height: var(--subhead-leading);\n  letter-spacing: var(--subhead-sentence-tracking);\n}\n.at-body {\n  font-family: var(--body-family);\n  font-weight: var(--body-weight-regular);\n  line-height: var(--body-leading);\n  letter-spacing: var(--body-tracking);\n}\n\n/* Agent Team — Spacing & radii\n * Calm, generous spacing. The brand is minimal with square-ish geometry;\n * text boxes and pills are the only rounded elements.\n */\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  /* Radii — the brand is largely square; only pills/badges round fully */\n  --radius-none: 0px;\n  --radius-sm: 2px;\n  --radius-pill: 999px;\n\n  /* Logo clear space = half the cap-height of the \"A\" (approx). */\n  --logo-clearspace-ratio: 0.5; /* @kind other */\n}\n\n<\u002Fstyle>\n<script src=\"10657428-066a-48ca-a446-5de1a8022e72\"><\u002Fscript>\n<script src=\"4fd5a984-fe3c-431f-89e1-c9f137aa39be\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; background: var(--at-dune); color: var(--at-black); font-family: var(--body-family); -webkit-font-smoothing: antialiased; }\n  a { color: var(--at-coyote); text-decoration: none; }\n  a:hover { color: var(--at-lion); }\n  input, select, textarea, button { font-family: var(--body-family); }\n  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--at-coyote) !important; }\n  ::placeholder { color: #9a927f; }\n  @keyframes ggFade { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100%; overflow-x:hidden; background:var(--at-dune);\">\n\n  <!-- ===== TOP BAR ===== -->\n  <header style=\"position:absolute; top:0; left:0; right:0; z-index:20; display:flex; align-items:center; justify-content:space-between; padding:22px clamp(20px,5vw,64px);\">\n    <x-import component-from-global-scope=\"AgentTeamDesignSystem_cbc85e.Logo\" tone=\"paper\" size=\"{{ logoSm }}\" hint-size=\"auto,28px\"><\u002Fx-import>\n    <div style=\"display:flex; align-items:center; gap:24px;\">\n      <a href=\"tel:0261528374\" style=\"color:var(--at-paper); font-weight:600; font-size:15px; letter-spacing:0.04em;\">02 6152 8374<\u002Fa>\n      <button onclick=\"{{ scrollToForm }}\" style=\"border:1px solid var(--at-lion); background:transparent; color:var(--at-paper); font-weight:700; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; padding:11px 20px; cursor:pointer;\">Register interest<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section style=\"position:relative; min-height:100vh; display:flex; align-items:flex-end; overflow:hidden;\">\n    <div style=\"position:absolute; inset:0;\">\n      <image-slot id=\"gg-hero\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a forest / coastal hero image\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div style=\"position:absolute; inset:0; background:linear-gradient(to bottom, rgba(20,14,4,0.35) 0%, rgba(20,14,4,0.15) 40%, rgba(46,34,14,0.82) 100%); pointer-events:none;\"><\u002Fdiv>\n\n    <div style=\"position:relative; z-index:5; width:100%; max-width:1180px; margin:0 auto; padding:0 clamp(20px,5vw,64px) clamp(48px,8vh,96px); pointer-events:none;\">\n      <div style=\"animation:ggFade 0.9s ease both;\">\n        <div style=\"width:120px; margin-bottom:22px;\">{{ gliderMark }}<\u002Fdiv>\n        <div style=\"font-family:var(--body-family); font-weight:700; font-size:13px; letter-spacing:0.28em; text-transform:uppercase; color:var(--at-lion-50); margin-bottom:18px;\">Mossy Point · NSW South Coast<\u002Fdiv>\n        <h1 style=\"font-family:var(--display-family); font-weight:400; line-height:0.86; letter-spacing:0.02em; text-transform:uppercase; margin:0; font-size:clamp(72px,13vw,190px);\">\n          <span style=\"color:var(--at-paper);\">Glider<\u002Fspan>&nbsp;<span style=\"color:var(--at-lion);\">Grove<\u002Fspan>\n        <\u002Fh1>\n        <p style=\"max-width:620px; margin:22px 0 0; color:var(--at-paper); font-size:clamp(18px,2.2vw,24px); line-height:1.5; letter-spacing:0.02em;\">Fourteen homesites in the trees, a short walk from the beach. A boutique forest release at Mossy Point.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:12px; margin-top:30px; pointer-events:auto;\">\n          <button onclick=\"{{ scrollToForm }}\" style=\"border:none; background:var(--at-lion); color:var(--at-black); font-weight:700; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; padding:16px 30px; cursor:pointer;\">Register your interest<\u002Fbutton>\n          <button onclick=\"{{ scrollToRelease }}\" style=\"border:1px solid rgba(255,255,255,0.6); background:transparent; color:var(--at-paper); font-weight:700; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; padding:16px 30px; cursor:pointer;\">See the release<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:34px; margin-top:38px;\">\n          <div style=\"display:flex; flex-direction:column; gap:2px;\">\n            <span style=\"font-family:var(--display-family); font-size:40px; line-height:1; color:var(--at-paper);\">14<\u002Fspan>\n            <span style=\"font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--at-lion-50); font-weight:700;\">Homesites<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width:1px; background:rgba(218,203,178,0.4);\"><\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:2px;\">\n            <span style=\"font-family:var(--display-family); font-size:40px; line-height:1; color:var(--at-paper);\">500–1,300<\u002Fspan>\n            <span style=\"font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--at-lion-50); font-weight:700;\">m² lot sizes<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"width:1px; background:rgba(218,203,178,0.4);\"><\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:2px;\">\n            <span style=\"font-family:var(--display-family); font-size:40px; line-height:1; color:var(--at-paper);\">Beach<\u002Fspan>\n            <span style=\"font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--at-lion-50); font-weight:700;\">A short walk away<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== INTRO ===== -->\n  <section style=\"background:var(--at-paper); padding:clamp(64px,11vh,128px) clamp(20px,5vw,64px);\">\n    <div style=\"max-width:1180px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:clamp(32px,6vw,88px); align-items:start;\">\n      <h2 style=\"font-family:var(--display-family); font-weight:400; line-height:0.9; letter-spacing:0.02em; text-transform:uppercase; margin:0; font-size:clamp(52px,7vw,104px);\">\n        <span style=\"color:var(--at-coyote);\">Room<\u002Fspan><br><span style=\"color:var(--at-coyote);\">to<\u002Fspan> <span style=\"color:var(--at-lion);\">grow<\u002Fspan>\n      <\u002Fh2>\n      <div>\n        <p style=\"margin:0; font-size:clamp(19px,1.5vw,23px); line-height:1.6; letter-spacing:0.01em; color:#2a2418;\">Glider Grove is a boutique release of fourteen generous homesites, tucked into the coastal forest of Mossy Point. It's a rare chance to build the family home you've been planning — with the beach, the bush and Broulee all on your doorstep.<\u002Fp>\n        <p style=\"margin:22px 0 0; font-size:17px; line-height:1.6; color:#5a5344;\">Mature trees retained. Generous blocks. Quiet streets. The kind of address where kids grow up barefoot and the canopy is part of everyday life.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== STATS BAND ===== -->\n  <section style=\"background:var(--at-coyote); padding:clamp(48px,8vh,80px) clamp(20px,5vw,64px);\">\n    <div style=\"max-width:1180px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:2px; background:rgba(255,255,255,0.14);\">\n      <div style=\"background:var(--at-coyote); padding:28px 10px; text-align:center;\">\n        <div style=\"font-family:var(--display-family); font-size:clamp(48px,5vw,68px); line-height:1; color:var(--at-paper);\">14<\u002Fdiv>\n        <div style=\"margin-top:8px; font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--at-lion-50);\">Homesites<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--at-coyote); padding:28px 10px; text-align:center;\">\n        <div style=\"font-family:var(--display-family); font-size:clamp(48px,5vw,68px); line-height:1; color:var(--at-paper);\">1,300<\u002Fdiv>\n        <div style=\"margin-top:8px; font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--at-lion-50);\">m² largest lot<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--at-coyote); padding:28px 10px; text-align:center;\">\n        <div style=\"font-family:var(--display-family); font-size:clamp(48px,5vw,68px); line-height:1; color:var(--at-paper);\">2 min<\u002Fdiv>\n        <div style=\"margin-top:8px; font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--at-lion-50);\">Walk to sand<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--at-coyote); padding:28px 10px; text-align:center;\">\n        <div style=\"font-family:var(--display-family); font-size:clamp(48px,5vw,68px); line-height:1; color:var(--at-paper);\">Broulee<\u002Fdiv>\n        <div style=\"margin-top:8px; font-size:12px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--at-lion-50);\">Minutes down the road<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== THE GLIDER STORY ===== -->\n  <section style=\"position:relative; background:var(--at-coyote); padding:clamp(64px,12vh,140px) clamp(20px,5vw,64px); overflow:hidden;\">\n    <div style=\"position:absolute; top:50%; right:-40px; transform:translateY(-50%); width:min(46vw,520px); opacity:0.12; pointer-events:none;\">{{ gliderMarkSoft }}<\u002Fdiv>\n    <div style=\"position:relative; max-width:760px; margin:0 auto;\">\n      <div style=\"font-family:var(--body-family); font-weight:700; font-size:13px; letter-spacing:0.24em; text-transform:uppercase; color:var(--at-lion); margin-bottom:20px;\">Why \"Glider Grove\"<\u002Fdiv>\n      <h2 style=\"font-family:var(--display-family); font-weight:400; line-height:0.9; letter-spacing:0.02em; text-transform:uppercase; margin:0 0 26px; font-size:clamp(46px,6.5vw,96px);\">\n        <span style=\"color:var(--at-paper);\">Named for<\u002Fspan><br><span style=\"color:var(--at-lion-50);\">a neighbour<\u002Fspan>\n      <\u002Fh2>\n      <p style=\"margin:0; font-size:clamp(18px,1.6vw,23px); line-height:1.6; color:var(--at-paper);\">The yellow-bellied glider calls these forests home — gliding tree to tree through the canopy at dusk, tracing the same treelines for generations.<\u002Fp>\n      <p style=\"margin:20px 0 0; font-size:17px; line-height:1.7; color:var(--at-lion-50);\">Glider Grove is designed to live lightly alongside it: mature trees retained, generous setbacks, and homesites that let the bush stay part of the picture. A place with room for your family — and for the ones already here.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== LIFESTYLE ===== -->\n  <section style=\"background:var(--at-paper);\">\n    <div style=\"max-width:1400px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); align-items:stretch;\">\n      <div style=\"min-height:clamp(360px,52vh,620px); position:relative;\">\n        <image-slot id=\"gg-lifestyle\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a lifestyle / beach photo\"><\u002Fimage-slot>\n      <\u002Fdiv>\n      <div style=\"padding:clamp(48px,7vw,96px) clamp(28px,5vw,80px); display:flex; flex-direction:column; justify-content:center;\">\n        <h2 style=\"font-family:var(--display-family); font-weight:400; line-height:0.9; letter-spacing:0.02em; text-transform:uppercase; margin:0 0 26px; font-size:clamp(46px,6vw,88px);\">\n          <span style=\"color:var(--at-coyote);\">The<\u002Fspan> <span style=\"color:var(--at-lion);\">lifestyle<\u002Fspan>\n        <\u002Fh2>\n        <p style=\"margin:0 0 28px; font-size:clamp(18px,1.4vw,22px); line-height:1.6; color:#2a2418;\">Wake up to birdsong, walk to the beach before breakfast, and grab a coffee in Broulee on the way home. Mossy Point is the quiet coastal pocket families keep to themselves.<\u002Fp>\n        <ul style=\"list-style:none; margin:0; padding:0; display:grid; gap:0;\">\n          <li style=\"display:flex; align-items:center; gap:16px; padding:16px 0; border-top:1px solid var(--at-lion-50); font-size:16px; color:#2a2418;\"><span style=\"width:8px; height:8px; background:var(--at-coyote); flex:0 0 auto;\"><\u002Fspan>A short stroll to Mossy Point beach &amp; the boat ramp<\u002Fli>\n          <li style=\"display:flex; align-items:center; gap:16px; padding:16px 0; border-top:1px solid var(--at-lion-50); font-size:16px; color:#2a2418;\"><span style=\"width:8px; height:8px; background:var(--at-coyote); flex:0 0 auto;\"><\u002Fspan>Minutes to Broulee cafés, shops &amp; primary school<\u002Fli>\n          <li style=\"display:flex; align-items:center; gap:16px; padding:16px 0; border-top:1px solid var(--at-lion-50); font-size:16px; color:#2a2418;\"><span style=\"width:8px; height:8px; background:var(--at-coyote); flex:0 0 auto;\"><\u002Fspan>Batemans Bay &amp; the Eurobodalla coast on your doorstep<\u002Fli>\n          <li style=\"display:flex; align-items:center; gap:16px; padding:16px 0; border-top:1px solid var(--at-lion-50); border-bottom:1px solid var(--at-lion-50); font-size:16px; color:#2a2418;\"><span style=\"width:8px; height:8px; background:var(--at-coyote); flex:0 0 auto;\"><\u002Fspan>Surrounded by coastal forest &amp; national park<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== THE RELEASE ===== -->\n  <section id=\"gg-release\" style=\"background:var(--at-dune); padding:clamp(64px,11vh,128px) clamp(20px,5vw,64px);\">\n    <div style=\"max-width:960px; margin:0 auto; text-align:center;\">\n      <div style=\"font-family:var(--body-family); font-weight:700; font-size:13px; letter-spacing:0.24em; text-transform:uppercase; color:var(--at-coyote); margin-bottom:18px;\">The release<\u002Fdiv>\n      <h2 style=\"font-family:var(--display-family); font-weight:400; line-height:0.9; letter-spacing:0.02em; text-transform:uppercase; margin:0 0 28px; font-size:clamp(48px,7vw,104px);\">\n        <span style=\"color:var(--at-coyote);\">Fourteen lots.<\u002Fspan><br><span style=\"color:var(--at-lion);\">Room to choose.<\u002Fspan>\n      <\u002Fh2>\n      <p style=\"margin:0 auto 44px; max-width:640px; font-size:clamp(18px,1.5vw,22px); line-height:1.6; color:#2a2418;\">Homesites from 500 to 1,300 m² — compact and low-maintenance, or room for the shed, the pool and the veggie patch. Titled and ready to build. Register now for the price list, site plan and first pick of the blocks.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:44px;\">\n        <div style=\"background:var(--at-paper); border-top:3px solid var(--at-coyote); padding:30px 20px; text-align:left;\">\n          <div style=\"font-family:var(--display-family); font-size:44px; line-height:1; color:var(--at-coyote);\">500–650 m²<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:15px; color:#5a5344; line-height:1.5;\">Easy-care blocks for a first home or lock-and-leave coastal base.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--at-paper); border-top:3px solid var(--at-lion); padding:30px 20px; text-align:left;\">\n          <div style=\"font-family:var(--display-family); font-size:44px; line-height:1; color:var(--at-coyote);\">650–900 m²<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:15px; color:#5a5344; line-height:1.5;\">The classic family block — house, garden and space for the trampoline.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--at-paper); border-top:3px solid var(--at-coyote); padding:30px 20px; text-align:left;\">\n          <div style=\"font-family:var(--display-family); font-size:44px; line-height:1; color:var(--at-coyote);\">900–1,300 m²<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:15px; color:#5a5344; line-height:1.5;\">Room to spread out — pool, shed and mature trees on the boundary.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ scrollToForm }}\" style=\"border:none; background:var(--at-coyote); color:var(--at-paper); font-weight:700; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; padding:17px 40px; cursor:pointer;\">Get the price list<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== REGISTER INTEREST ===== -->\n  <section id=\"gg-register\" style=\"background:var(--at-paper);\">\n    <div style=\"max-width:1400px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); align-items:stretch;\">\n      <!-- form -->\n      <div style=\"padding:clamp(48px,7vw,104px) clamp(28px,5vw,80px);\">\n        <h2 style=\"font-family:var(--display-family); font-weight:400; line-height:0.9; letter-spacing:0.02em; text-transform:uppercase; margin:0 0 12px; font-size:clamp(44px,5.5vw,80px);\">\n          <span style=\"color:var(--at-coyote);\">Register<\u002Fspan> <span style=\"color:var(--at-lion);\">interest<\u002Fspan>\n        <\u002Fh2>\n        <p style=\"margin:0 0 34px; font-size:17px; line-height:1.6; color:#5a5344; max-width:460px;\">Be first to see the price list and site plan. No obligation — just early access to the Glider Grove release.<\u002Fp>\n\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onSubmit }}\" style=\"display:grid; gap:16px; max-width:520px;\">\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n              <input required=\"\" placeholder=\"First name\" style=\"border:1px solid var(--at-lion-50); background:var(--at-dune-50); padding:14px 16px; font-size:16px; color:var(--at-black);\">\n              <input required=\"\" placeholder=\"Last name\" style=\"border:1px solid var(--at-lion-50); background:var(--at-dune-50); padding:14px 16px; font-size:16px; color:var(--at-black);\">\n            <\u002Fdiv>\n            <input required=\"\" type=\"email\" placeholder=\"Email address\" style=\"border:1px solid var(--at-lion-50); background:var(--at-dune-50); padding:14px 16px; font-size:16px; color:var(--at-black);\">\n            <input type=\"tel\" placeholder=\"Phone\" style=\"border:1px solid var(--at-lion-50); background:var(--at-dune-50); padding:14px 16px; font-size:16px; color:var(--at-black);\">\n            <select style=\"border:1px solid var(--at-lion-50); background:var(--at-dune-50); padding:14px 16px; font-size:16px; color:var(--at-black);\">\n              <option>Which lot size interests you?<\u002Foption>\n              <option>500–650 m² — easy-care<\u002Foption>\n              <option>650–900 m² — family block<\u002Foption>\n              <option>900–1,300 m² — room to spread out<\u002Foption>\n              <option>Not sure yet — show me everything<\u002Foption>\n            <\u002Fselect>\n            <textarea rows=\"3\" placeholder=\"Anything you'd like us to know? (optional)\" style=\"border:1px solid var(--at-lion-50); background:var(--at-dune-50); padding:14px 16px; font-size:16px; color:var(--at-black); resize:vertical;\"><\u002Ftextarea>\n            <button type=\"submit\" style=\"border:none; background:var(--at-coyote); color:var(--at-paper); font-weight:700; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; padding:17px 30px; cursor:pointer; justify-self:start;\">Register my interest<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:var(--at-dune); border-left:4px solid var(--at-coyote); padding:34px 32px; max-width:520px;\">\n            <div style=\"font-family:var(--display-family); font-size:40px; line-height:0.95; color:var(--at-coyote); margin-bottom:10px;\">Thanks — you're on the list<\u002Fdiv>\n            <p style=\"margin:0; font-size:16px; line-height:1.6; color:#2a2418;\">We'll be in touch shortly with the Glider Grove price list and site plan. In the meantime, call Steve on <a href=\"tel:0261528374\">02 6152 8374<\u002Fa> with any questions.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- agent card -->\n      <div style=\"background:var(--at-coyote); padding:clamp(48px,7vw,104px) clamp(28px,5vw,80px); display:flex; flex-direction:column; justify-content:center;\">\n        <div style=\"font-family:var(--body-family); font-weight:700; font-size:12px; letter-spacing:0.24em; text-transform:uppercase; color:var(--at-lion-50); margin-bottom:22px;\">Your agent<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:20px; margin-bottom:28px;\">\n          <div style=\"width:84px; height:84px; background:var(--at-lion); display:flex; align-items:center; justify-content:center; flex:0 0 auto;\">\n            <span style=\"font-family:var(--display-family); font-size:40px; color:var(--at-coyote); line-height:1;\">SL<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--display-family); font-size:38px; line-height:0.95; color:var(--at-paper);\">Steve Lowe<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--at-lion-50); margin-top:4px;\">Director · Agent Team<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:0 0 30px; font-size:16px; line-height:1.6; color:var(--at-paper); max-width:420px;\">A boutique, hands-on approach — from first appraisal to the day you pick up the keys. Local knowledge, straight answers, and a genuine feel for building on the coast.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <a href=\"tel:0261528374\" style=\"color:var(--at-paper); font-size:16px; font-weight:600; display:flex; align-items:center; gap:12px;\"><span style=\"width:6px; height:6px; background:var(--at-lion);\"><\u002Fspan>02 6152 8374<\u002Fa>\n          <a href=\"mailto:admin@agentteam.com.au\" style=\"color:var(--at-paper); font-size:16px; font-weight:600; display:flex; align-items:center; gap:12px;\"><span style=\"width:6px; height:6px; background:var(--at-lion);\"><\u002Fspan>admin@agentteam.com.au<\u002Fa>\n          <a href=\"https://agentteam.com.au\" style=\"color:var(--at-paper); font-size:16px; font-weight:600; display:flex; align-items:center; gap:12px;\"><span style=\"width:6px; height:6px; background:var(--at-lion);\"><\u002Fspan>agentteam.com.au<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background:var(--at-black); padding:clamp(48px,7vh,80px) clamp(20px,5vw,64px) 40px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:40px; align-items:start; padding-bottom:36px; border-bottom:1px solid rgba(255,255,255,0.14);\">\n        <div>\n          <div style=\"font-family:var(--display-family); font-weight:400; font-size:40px; letter-spacing:0.03em; text-transform:uppercase; line-height:0.9; margin-bottom:14px;\"><span style=\"color:var(--at-paper);\">Glider<\u002Fspan> <span style=\"color:var(--at-lion);\">Grove<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:14px; line-height:1.6; color:rgba(255,255,255,0.6); max-width:280px;\">Fourteen homesites in the coastal forest at Mossy Point, NSW.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--at-lion); margin-bottom:16px;\">Marketed by<\u002Fdiv>\n          <div style=\"margin-bottom:12px;\"><x-import component-from-global-scope=\"AgentTeamDesignSystem_cbc85e.Logo\" tone=\"paper\" size=\"{{ logoFoot }}\" hint-size=\"auto,42px\"><\u002Fx-import><\u002Fdiv>\n          <p style=\"margin:0; font-size:14px; line-height:1.7; color:rgba(255,255,255,0.6);\">Shop 6, 48 Hardwick Crescent,<br>Holt ACT 2615<br>02 6152 8374<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px; align-items:flex-start;\">\n          <div style=\"font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--at-lion); margin-bottom:4px;\">Follow along<\u002Fdiv>\n          <x-import component-from-global-scope=\"AgentTeamDesignSystem_cbc85e.SocialPill\" network=\"website\" label=\"agentteam.com.au\" tone=\"on-dark\" size=\"{{ socialSm }}\" hint-size=\"auto,34px\"><\u002Fx-import>\n          <x-import component-from-global-scope=\"AgentTeamDesignSystem_cbc85e.SocialPill\" network=\"instagram\" label=\"@agentteamcanberra\" tone=\"on-dark\" size=\"{{ socialSm }}\" hint-size=\"auto,34px\"><\u002Fx-import>\n          <x-import component-from-global-scope=\"AgentTeamDesignSystem_cbc85e.SocialPill\" network=\"facebook\" label=\"Agent Team\" tone=\"on-dark\" size=\"{{ socialSm }}\" hint-size=\"auto,34px\"><\u002Fx-import>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; padding-top:22px;\">\n        <div style=\"font-family:var(--display-family); font-size:20px; letter-spacing:0.06em; text-transform:uppercase; color:var(--at-lion-50);\">Powered by Agent Team.<\u002Fdiv>\n        <div style=\"font-size:12px; color:rgba(255,255,255,0.45); max-width:560px; line-height:1.6;\">Lot sizes and imagery are indicative only and subject to change. Register your interest for current pricing and the final site plan.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { submitted: false };\n\n  scrollTo(id) {\n    const el = document.getElementById(id);\n    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 10, behavior: 'smooth' });\n  }\n\n  gliderSvg(color) {\n    // Top-down gliding silhouette of a yellow-bellied glider: membrane spread,\n    // head + ears at top, long tail trailing below. Single-tone, square-friendly.\n    return React.createElement('svg', {\n      viewBox: '0 0 260 350', width: '100%', height: 'auto',\n      style: { display: 'block' }, 'aria-label': 'Gliding glider'\n    }, [\n      // gliding membrane: four sharp spread limbs, webbed (concave) edges between\n      React.createElement('path', { key: 'm', fill: color, d:\n        'M30 86 Q130 130 230 86 Q150 176 202 254 Q130 214 58 254 Q110 176 30 86 Z' }),\n      // neck / body linking head to membrane\n      React.createElement('path', { key: 'b', fill: color, d: 'M112 78 L148 78 L142 150 L118 150 Z' }),\n      // head\n      React.createElement('circle', { key: 'h', fill: color, cx: 130, cy: 62, r: 30 }),\n      // ears\n      React.createElement('path', { key: 'el', fill: color, d: 'M106 40 Q96 10 120 34 Q124 43 117 50 Z' }),\n      React.createElement('path', { key: 'er', fill: color, d: 'M154 40 Q164 10 140 34 Q136 43 143 50 Z' }),\n      // broad tapered tail\n      React.createElement('path', { key: 't', fill: color, d:\n        'M112 208 C104 260 114 300 124 330 Q130 341 136 330 C146 300 156 260 148 208 C140 220 120 220 112 208 Z' }),\n    ]);\n  }\n\n  renderVals() {\n    return {\n      logoSm: 26,\n      logoFoot: 44,\n      socialSm: 15,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      onSubmit: (e) => { e.preventDefault(); this.setState({ submitted: true }); this.scrollTo('gg-register'); },\n      scrollToForm: () => this.scrollTo('gg-register'),\n      scrollToRelease: () => this.scrollTo('gg-release'),\n      gliderMark: this.gliderSvg('var(--at-lion)'),\n      gliderMarkSoft: this.gliderSvg('var(--at-paper)'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
